name: Build rsync 3.2.7 Static x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-xxhash
            mingw-w64-x86_64-popt
            wget patch

      - name: Download & Extract source (skip testsuite/symlink)
        shell: msys2 {0}
        run: |
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          tar -zxf rsync-3.2.7.tar.gz \
            --exclude='rsync-3.2.7/testsuite/*' \
            --no-same-permissions \
            --no-same-owner

      - name: Patch source for Windows WinSock & uchar
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          # 1. 替换 sys/socket.h 为 Windows winsock2.h
          sed -i 's|#include <sys/socket.h>|#include <winsock2.h>\n#include <ws2tcpip.h>|g' rsync.h
          # 2. 定义 uchar 类型
          sed -i '1i typedef unsigned char uchar;' rsync.h
          # 3. 关闭 MTIM 时间字段、绕过 socklen_t 检测
          echo "ac_cv_type_socklen_t=yes" >> config.site
          echo "ac_cv_header_sys_socket_h=no" >> config.site
          echo "ac_cv_struct_st_mtim=no" >> config.site

      - name: Configure build
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          export CFLAGS="-static -static-libgcc -static-libstdc++ -DWIN32 -D_WIN32 -DNO_MTIM"
          export LDFLAGS="-static -static-libgcc -static-libstdc++ -lws2_32"
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=/mingw64 \
            --disable-shared \
            --enable-static \
            --disable-iconv \
            --disable-locale \
            --disable-tests \
            --with-config-file=none

      - name: Compile & Install
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          make -j$(nproc)
          make install
          strip /mingw64/bin/rsync.exe

      - name: Collect artifacts
        shell: msys2 {0}
        run: |
          mkdir -p ./output
          cp /mingw64/bin/rsync.exe ./output/
          cp /mingw64/bin/libwinpthread-1.dll ./output/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-x64-static
          path: ./output/
