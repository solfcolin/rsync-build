name: Build rsync 3.2.7 Cygwin x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    name: Test rsync on Cygwin
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        line-ending: lf

    - name: Install Cygwin via Choco
      run: choco install -y --no-progress cygwin cyg-get wget

    # 批量安装已有依赖包
    - name: Install Cygwin packages
      run: |
        cyg-get make,autoconf,automake,gcc-core,attr,libattr-devel,python38,python38-pip
        cyg-get popt,popt-devel,zstd,libzstd libzstd-devel lz4,liblz4 liblz4-devel
        cyg-get openssl,libssl-devel,xxhash,libxxhash0,libxxhash-devel 
        echo "C:/tools/cygwin/bin" >>$Env:GITHUB_PATH
    - name: Build & Compile
      shell: bash
      run: |
        bash -c 'python3 -mpip install --user commonmark'
        bash -c 'wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz' 
        # 排除测试目录，规避软链接报错
        bash -c 'tar -zxf rsync-3.2.7.tar.gz --exclude="rsync-3.2.7/testsuite/*"'
        
        # 禁用检测失败的组件，直接完成配置
        bash -c 'cd rsync-3.2.7 && ./configure --with-rrsync'
        bash -c 'cd rsync-3.2.7 && make -j$(nproc)'
        bash -c 'cd rsync-3.2.7 && make install'
        bash -c 'cd rsync-3.2.7 && strip /usr/local/bin/rsync.exe'
        bash -c 'cd rsync-3.2.7 && /usr/local/bin/rsync --version'

    - name: Collect artifacts
      run: |
        mkdir -p ./output
        copy "C:\tools\cygwin\usr\local\bin\rsync.exe" ./output
        copy "C:\tools\cygwin\usr\local\bin\rrsync" ./output
        copy "C:\tools\cygwin\bin\cygwin1.dll" ./output

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cygwin-bin
        path: ./output/