name: Build rsync 3.2.7 Cygwin x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 Cygwin 基础编译包（沿用你指定列表）
      - name: Install Cygwin base packages
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: >
            make,gawk,autoconf,automake,gcc-core,
            python38,python38-pip,python38-commonmark,
            attr,libattr-devel,
            libzstd-devel,
            liblz4-devel,
            libssl-devel,
            zlib-devel,popt-devel,xxhash-devel,wget

      # 兜底：pip 补充 commonmark（彻底解决随机缺失问题）
      - name: Install commonmark via pip
        shell: cygwin
        run: |
          python3 -mpip install --user commonmark

      # 下载并解压 rsync 3.2.7 源码
      - name: Download & Extract source
        shell: cygwin
        run: |
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          tar -zxf rsync-3.2.7.tar.gz
          cd rsync-3.2.7

      # 官方标准 configure（遵循 INSTALL.md）
      - name: Configure
        shell: cygwin
        run: |
          cd rsync-3.2.7
          ./configure \
            --prefix=/usr/local \
            --enable-static \
            --disable-shared \
            --with-zlib \
            --with-lz4 \
            --with-zstd \
            --with-xxhash \
            --with-popt \
            --disable-iconv

      # 编译 + 安装 + 瘦身
      - name: Build & Install
        shell: cygwin
        run: |
          cd rsync-3.2.7
          make -j$(nproc)
          make install
          strip /usr/local/bin/rsync.exe

      # 收集所有运行依赖
      - name: Collect artifacts
        shell: cygwin
        run: |
          mkdir -p ./output
          cp /usr/local/bin/rsync.exe ./output/
          cp /usr/bin/cygwin1.dll ./output/
          cp /usr/bin/cygzstd-1.dll ./output/ 2>/dev/null || true
          cp /usr/bin/cyglz4-1.dll ./output/ 2>/dev/null || true
          cp /usr/bin/cygssl-3.dll ./output/ 2>/dev/null || true

      # 上传编译产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-cygwin-x64
          path: ./output/
