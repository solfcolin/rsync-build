name: Build rsync 3.2.7 Cygwin x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cygwin packages
        uses: cygwin/cygwin-install-action@v4
        with:
          packages: >
            make,gawk,autoconf,automake,gcc-core,
            python38,python38-pip,python38-commonmark,
            attr,libattr-devel,
            libzstd-devel,liblz4-devel,libssl-devel,
            zlib-devel,popt-devel,xxhash-devel,wget

      # 合并所有 bash 操作到同一个 cygwin shell，避免命令找不到
      - name: Prepare deps + Build rsync
        shell: cygwin
        run: |
          # 兜底安装 commonmark，统一在 Cygwin 环境内执行
          python3 -m pip install --user commonmark

          # 下载&解压源码
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          tar -zxf rsync-3.2.7.tar.gz
          cd rsync-3.2.7

          # 官方标准 configure
          ./configure \
            --prefix=/usr/local \
            --enable-static \
            --disable-shared \
            --with-zlib \
            --with-lz4 \
            --with-zstd \
            --with-xxhash \
            --with-popt \
            --disable-iconv

          # 编译安装
          make -j$(nproc)
          make install
          strip /usr/local/bin/rsync.exe

      - name: Collect output files
        shell: cygwin
        run: |
          mkdir -p ./output
          cp /usr/local/bin/rsync.exe ./output/
          cp /usr/bin/cygwin1.dll ./output/
          cp /usr/bin/cygzstd-1.dll ./output/ 2>/dev/null || true
          cp /usr/bin/cyglz4-1.dll ./output/ 2>/dev/null || true
          cp /usr/bin/cygssl-3.dll ./output/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-cygwin-x64
          path: ./output/
