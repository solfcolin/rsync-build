name: Build rsync 3.2.7 Static x64 (Single EXE)
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-xxhash
            mingw-w64-x86_64-popt
            wget

      - name: Download rsync source
        shell: msys2 {0}
        run: |
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          tar -zxf rsync-3.2.7.tar.gz
          cd rsync-3.2.7

      - name: Configure & Static Build
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          # 全局静态链接参数
          export CFLAGS="-static -static-libgcc -static-libstdc++"
          export LDFLAGS="-static -static-libgcc -static-libstdc++"
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=/mingw64 \
            --disable-shared \
            --enable-static \
            --disable-iconv \
            --disable-locale
          make -j$(nproc)
          make install
          # 精简体积：剥离调试符号
          strip /mingw64/bin/rsync.exe

      - name: Collect single exe
        shell: msys2 {0}
        run: |
          mkdir -p ./output
          cp /mingw64/bin/rsync.exe ./output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-x64-static-single-exe
          path: ./output/
