name: Build rsync 3.2.7 Static x64 (Single EXE)
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-xxhash
            mingw-w64-x86_64-popt
            wget

      - name: Download rsync source & Extract (skip symlink)
        shell: msys2 {0}
        run: |
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          # --no-same-permissions --no-same-owner 适配Windows
          # --exclude='*.test' 直接过滤测试目录（彻底避开软链接）
          tar -zxf rsync-3.2.7.tar.gz \
            --exclude='rsync-3.2.7/testsuite/*' \
            --no-same-permissions \
            --no-same-owner
          cd rsync-3.2.7

      - name: Configure & Static Build
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          export CFLAGS="-static -static-libgcc -static-libstdc++"
          export LDFLAGS="-static -static-libgcc -static-libstdc++"
          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=/mingw64 \
            --disable-shared \
            --enable-static \
            --disable-iconv \
            --disable-locale \
            --disable-tests
          make -j$(nproc)
          make install
          strip /mingw64/bin/rsync.exe

      - name: Collect single exe
        shell: msys2 {0}
        run: |
          mkdir -p ./output
          cp /mingw64/bin/rsync.exe ./output/
          # 兜底：如果仍依赖 pthread，一并拷贝
          cp /mingw64/bin/libwinpthread-1.dll ./output/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-x64-static
          path: ./output/
