name: Build rsync 3.2.7 Static x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2 MINGW64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-lz4
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-xxhash
            mingw-w64-x86_64-popt
            wget

      - name: Download & Extract source (skip testsuite/symlink)
        shell: msys2 {0}
        run: |
          wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
          tar -zxf rsync-3.2.7.tar.gz \
            --exclude='rsync-3.2.7/testsuite/*' \
            --no-same-permissions \
            --no-same-owner
          cd rsync-3.2.7

      - name: Configure fix socklen_t & Win32
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          export CFLAGS="-static -static-libgcc -static-libstdc++ -DWIN32 -D_WIN32 -DNO_MTIM"
          export LDFLAGS="-static -static-libgcc -static-libstdc++ -lws2_32"
          export ac_cv_type_socklen_t=yes
          export ac_cv_header_sys_socket_h=yes

          ./configure \
            --host=x86_64-w64-mingw32 \
            --prefix=/mingw64 \
            --disable-shared \
            --enable-static \
            --disable-iconv \
            --disable-locale \
            --disable-tests

      - name: Compile & Install
        shell: msys2 {0}
        run: |
          cd rsync-3.2.7
          make -j$(nproc)
          make install
          strip /mingw64/bin/rsync.exe

      - name: Collect artifacts
        shell: msys2 {0}
        run: |
          mkdir -p ./output
          cp /mingw64/bin/rsync.exe ./output/
          cp /mingw64/bin/libwinpthread-1.dll ./output/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsync-3.2.7-x64-static
          path: ./output/
