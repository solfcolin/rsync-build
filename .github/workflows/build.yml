name: Build rsync 3.2.7 Cygwin x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    name: Test rsync on Cygwin
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # 强制输出 Unix 换行，杜绝 \r 字符
        line-ending: lf

    - name: Install Cygwin via Choco
      run: choco install -y --no-progress cygwin cyg-get wget

    # 单行完整包列表，无换行语法问题
    - name: Install Cygwin packages
      run: |
        cyg-get make,autoconf,automake,gcc-core,attr,libattr-devel,python39,python39-pip
        cyg-get libzstd,libzstd-devel,liblz4,liblz4-devel,libssl,libssl-devel,libxxhash0
        cyg-get libxxhash-devel,popt,popt-devel
        # 写入PATH并立即刷新
        [Environment]::SetEnvironmentVariable('PATH', "C:\tools\cygwin\bin;$env:PATH", 'Machine')
        $env:PATH = "C:\tools\cygwin\bin;$env:PATH"

    # 纯Bash执行，内置PATH，确保wget可用
    - name: Build & Compile
      shell: bash
      run: |
        python3 -m pip install --user commonmark --no-warn-script-location
        wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
        tar -zxf rsync-3.2.7.tar.gz --exclude='rsync-3.2.7/testsuite/*'
        cd rsync-3.2.7
        ./configure --with-rrsync
        make -j$(nproc)
        make install
        strip /usr/local/bin/rsync.exe
        /usr/local/bin/rsync --version

    - name: Make check
      shell: bash
      run: |
        export PATH="/cygdrive/c/tools/cygwin/bin:$PATH"
        cd rsync-3.2.7
        RSYNC_EXPECT_SKIPPED=acls-default,acls-depth,acls,bare-do-open-symlink-race,chdir-symlink-race,chown,daemon-access-ip,daemon-chroot-acl,devices,dir-sgid,open-noatime,protected-regular,proxy-response-line-too-long,sender-flist-symlink-leak,simd-checksum,symlink-dirlink-basis make check

    - name: TCP daemon test
      shell: bash
      run: |
        export PATH="/cygdrive/c/tools/cygwin/bin:$PATH"
        cd rsync-3.2.7
        ./runtests.py --rsync-bin=`pwd`/rsync.exe --use-tcp -j 8

    - name: Rsync-ssl test
      shell: bash
      run: |
        export PATH="/cygdrive/c/tools/cygwin/bin:/usr/local/bin:$PATH"
        rsync-ssl --no-motd download.samba.org::rsyncftp/ || true

    - name: Collect artifacts
      run: |
        mkdir -p ./output
        copy "C:\tools\cygwin\usr\local\bin\rsync.exe" ./output
        copy "C:\tools\cygwin\usr\local\bin\rsync-ssl" ./output
        copy "C:\tools\cygwin\usr\local\bin\rrsync" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rsync.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rsync-ssl.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rrsync.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man5\rsyncd.conf.5" ./output
        copy "C:\tools\cygwin\bin\cygwin1.dll" ./output

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cygwin-bin
        path: ./output/
