name: Build rsync 3.2.7 Cygwin x64
on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-2022
    name: Test rsync on Cygwin
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        line-ending: lf

    # 缓存 Cygwin 整个安装目录
    - name: Cache entire Cygwin
      uses: actions/cache@v4
      id: cache-cygwin
      with:
        path: C:\tools\cygwin
        key: cygwin-full-${{ runner.os }}-${{ hashFiles('cygwin-packages-list.txt') }}
        restore-keys: |
          cygwin-full-${{ runner.os }}-

    # 缓存 Python 包（commonmark 等）
    - name: Cache Python packages
      uses: actions/cache@v4
      id: cache-python
      with:
        path: ~/.local  # Cygwin 下 pip --user 安装的包位置
        key: python-packages-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          python-packages-${{ runner.os }}-

    - name: Install Cygwin via Choco
      if: steps.cache-cygwin.outputs.cache-hit != 'true'
      run: choco install -y --no-progress cygwin cyg-get wget

    - name: Install Cygwin packages
      if: steps.cache-cygwin.outputs.cache-hit != 'true'
      run: |
        $packages = @(
          "make", "gawk", "autoconf", "automake", "gcc-core", "python39", "python39-pip",
          "attr", "libattr-devel",
          "libzstd-devel", "liblz4-devel", "libssl-devel",
          "libxxhash0", "libxxhash-devel"
        )
        $packages -join "," | Out-File -FilePath cygwin-packages-list.txt -Encoding ascii
        
        C:\tools\cygwin\cygwinsetup.exe -qgnNdO `
          -R C:/tools/cygwin `
          -l C:/tools/cygwin/package `
          -s http://mirrors.kernel.org/sourceware/cygwin/ `
          -P make,gawk,autoconf,automake,gcc-core,python39,python39-pip,attr,libattr-devel,libzstd-devel,liblz4-devel,libssl-devel,libxxhash0,libxxhash-devel
        
        echo "C:/tools/cygwin/bin" >> $Env:GITHUB_PATH

    - name: Add Cygwin to PATH (always)
      if: steps.cache-cygwin.outputs.cache-hit == 'true'
      run: echo "C:/tools/cygwin/bin" >> $Env:GITHUB_PATH

    # 安装 Python 包（仅当缓存未命中时）
    - name: Install commonmark
      if: steps.cache-python.outputs.cache-hit != 'true'
      shell: bash
      run: |
        python3 -m pip install --user commonmark

    # 确保 PATH 包含 ~/.local/bin（Python 用户安装目录）
    - name: Add Python user bin to PATH
      shell: bash
      run: |
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Build & Compile
      shell: bash
      run: |
        wget https://www.samba.org/ftp/rsync/src/rsync-3.2.7.tar.gz
        tar -zxf rsync-3.2.7.tar.gz
        cd rsync-3.2.7
        ./configure --with-rrsync
        make -j$(nproc)
        make install
        strip /usr/local/bin/rsync.exe
        /usr/local/bin/rsync --version

    - name: Make check
      shell: bash
      run: |
        cd rsync-3.2.7
        RSYNC_EXPECT_SKIPPED="acls-default,acls-depth,acls,bare-do-open-symlink-race,chdir-symlink-race,chown,daemon-access-ip,daemon-chroot-acl,devices,dir-sgid,open-noatime,protected-regular,proxy-response-line-too-long,sender-flist-symlink-leak,simd-checksum,symlink-dirlink-basis" make check

    - name: TCP daemon test
      shell: bash
      run: |
        cd rsync-3.2.7
        ./runtests.py --rsync-bin=$(pwd)/rsync.exe --use-tcp -j 8

    - name: Rsync-ssl test
      shell: bash
      run: |
        rsync-ssl --no-motd download.samba.org::rsyncftp/ || true

    - name: Collect artifacts
      run: |
        mkdir -p ./output
        copy "C:\tools\cygwin\usr\local\bin\rsync.exe" ./output
        copy "C:\tools\cygwin\usr\local\bin\rsync-ssl" ./output
        copy "C:\tools\cygwin\usr\local\bin\rrsync" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rsync.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rsync-ssl.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man1\rrsync.1" ./output
        copy "C:\tools\cygwin\usr\local\man\man5\rsyncd.conf.5" ./output
        copy "C:\tools\cygwin\bin\cygwin1.dll" ./output

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: cygwin-bin
        path: ./output/
